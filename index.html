<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Kontroli - Meblobranie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-active { overflow: hidden; }
        .img-box { width: 100%; height: 300px; object-fit: contain; background: #f1f5f9; border-radius: 16px; margin: 10px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
        <h1 class="text-2xl font-black text-blue-900">Katalog konroli uszkodzeń</h1>
        
        <div class="flex items-center gap-4">
            <a href="dane.csv" download="dane.csv" class="hidden md:block px-4 py-2 bg-yellow-50 hover:bg-yellow-100 text-slate-600 rounded-xl text-[10px] font-black transition uppercase tracking-widest border border-slate-200">
                Pobierz CSV ↓
            </a>
            
            <div id="statusInfo" class="px-4 py-2 rounded-full text-xs font-bold bg-blue-50 text-blue-600 transition-all uppercase tracking-widest">
                Wczytywanie...
            </div>
        </div>
    </div>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Szukaj (Kod/SKU/RSL TAG)</label>
                <input type="text" id="searchTxt" oninput="applyFilters()" placeholder="Wpisz..." class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Asortyment</label>
                <select id="filterAsortyment" onchange="applyFilters()" class="w-full border p-2.5 rounded-xl outline-none bg-white"></select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Kondycja</label>
                <select id="filterKondycja" onchange="applyFilters()" class="w-full border p-2.5 rounded-xl outline-none bg-white"></select>
            </div>
            <div class="flex items-end">
                <button onclick="sortByDate()" class="w-full bg-blue-600 text-white p-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    Data <span id="sortIcon">↕</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[11px] uppercase font-black text-slate-400 tracking-tighter">
                            <th class="p-4">Kod</th>
                            <th class="p-4">SKU</th>
                            <th class="p-4">RSL TAG</th>
                            <th class="p-4">Data kontroli</th>
                            <th class="p-4 text-center">Kondycja</th>
                            <th class="p-4">Asortyment</th>
                            <th class="p-4 text-center">Szczegóły</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4" onclick="if(event.target == this) toggleModal()">
        <div class="bg-white w-full max-w-xl rounded-[32px] p-8 relative max-h-[90vh] overflow-y-auto">
            <button class="absolute top-6 right-6 text-3xl font-light text-slate-400 hover:text-black" onclick="toggleModal()">&times;</button>
            <h2 id="mTitle" class="text-3xl font-black text-blue-900 mb-6"></h2>
            
            <div id="modalPhotos"></div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <div class="bg-slate-50 p-4 rounded-2xl"><span class="text-[10px] font-bold text-slate-400 uppercase">SKU</span><p id="mSku" class="font-black"></p></div>
                <div class="bg-slate-50 p-4 rounded-2xl"><span class="text-[10px] font-bold text-slate-400 uppercase">Kondycja</span><p id="mKond" class="font-black"></p></div>
                <div class="col-span-2 bg-blue-50 p-4 rounded-2xl italic text-slate-600 border border-blue-100">
                    <span class="text-[10px] font-bold text-blue-400 uppercase not-italic">Uwagi</span>
                    <p id="mOpis" class="mt-1"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_FILE = "dane.csv";
        const FOTO_PATH = "foto/";
        let rawData = [];
        let dateAsc = false;

        async function init() {
            const status = document.getElementById('statusInfo');
            try {
                const response = await fetch(CSV_FILE + '?v=' + Date.now());
                if (!response.ok) throw new Error("Nie znaleziono pliku dane.csv");
                
                const text = await response.text();
                rawData = parseCSV(text);
                
                populateFilters();
                render(rawData);
                status.innerText = "Ilość pozycji: " + rawData.length;
                status.classList.replace('text-blue-600', 'text-green-600');
            } catch (err) {
                status.innerText = "BŁĄD: " + err.message;
                status.classList.replace('bg-blue-50', 'bg-red-50');
            }
        }

        function parseCSV(text) {
            // Rozbijamy na linie i usuwamy puste
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            // Pierwsza linia to nagłówki
            const headers = lines[0].split(';').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                const values = line.split(';').map(v => v.trim());
                let obj = {};
                headers.forEach((header, i) => obj[header] = values[i]);
                return obj;
            });
        }

        function populateFilters() {
            const asort = [...new Set(rawData.map(i => i.Asortyment))].filter(Boolean).sort();
            const kond = [...new Set(rawData.map(i => i.Kondycja))].filter(Boolean).sort();
            
            const fA = document.getElementById('filterAsortyment');
            const fK = document.getElementById('filterKondycja');
            
            fA.innerHTML = '<option value="">Wszystkie</option>' + asort.map(v => `<option value="${v}">${v}</option>`).join('');
            fK.innerHTML = '<option value="">Wszystkie</option>' + kond.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function applyFilters() {
            const txt = document.getElementById('searchTxt').value.toLowerCase();
            const fA = document.getElementById('filterAsortyment').value;
            const fK = document.getElementById('filterKondycja').value;
            
            const filtered = rawData.filter(i => {
                const mTxt = (i.Kod + i.SKU+ (i['RSL TAG'] || '')).toLowerCase().includes(txt);
                return mTxt && (!fA || i.Asortyment === fA) && (!fK || i.Kondycja === fK);
            });
            render(filtered);
        }

        function sortByDate() {
            dateAsc = !dateAsc;
            document.getElementById('sortIcon').innerText = dateAsc ? "↑" : "↓";
            rawData.sort((a,b) => {
                const parse = (d) => { if(!d) return 0; const p = d.split('.'); return new Date(p[2], p[1]-1, p[0]); };
                return dateAsc ? parse(a['Data kontroli']) - parse(b['Data kontroli']) : parse(b['Data kontroli']) - parse(a['Data kontroli']);
            });
            applyFilters();
        }

        function render(data) {
            document.getElementById('tableBody').innerHTML = data.map(i => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-black text-blue-900">${i.Kod}</td>
                    <td class="p-4 text-slate-400 font-mono text-xs">${i.SKU}</td>
                    <td class="p-4 font-medium text-blue-600">${i['RSL TAG'] || '---'}</td>
                    <td class="p-4">${i['Data kontroli'] || '---'}</td>
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded-md font-bold text-[10px] ${i.Kondycja === 'HDL' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${i.Kondycja}</span></td>
                    <td class="p-4 font-medium text-slate-600">${i.Asortyment}</td>
                    <td class="p-4 text-center"><button onclick="openModal('${i.Kod}')" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-blue-600 hover:text-white transition">🔍</button></td>
                </tr>
            `).join('');
        }

        function openModal(kod) {
            const i = rawData.find(x => x.Kod === kod);
            if(!i) return;
            document.getElementById('mTitle').innerText = i.Kod;
            document.getElementById('mSku').innerText = i.SKU;
            document.getElementById('mKond').innerText = i.Kondycja;
            document.getElementById('mOpis').innerText = i.Opis || "Brak uwag.";
            
            const photos = [`${i.Kod}.jpg`, `${i.Kod}_2.jpg`, `${i.Kod}_3.jpg`];
            document.getElementById('modalPhotos').innerHTML = photos.map(p => 
                `<img src="${FOTO_PATH}${p}" class="img-box mb-4" onerror="this.style.display='none'">`
            ).join('');

            document.getElementById('modal').style.display = 'flex';
            document.body.classList.add('modal-active');
        }

        function toggleModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.classList.remove('modal-active');
        }

        window.onload = init;
    </script>
</body>
</html>
